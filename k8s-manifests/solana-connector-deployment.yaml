apiVersion: apps/v1
kind: Deployment
metadata:
  name: solana-connector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: solana-connector
  template:
    metadata:
      labels:
        app: solana-connector
    spec:
      containers:
      - name: solana-connector
        image: solana-connector:latest
        ports:
        - containerPort: 8082
        env:
        - name: KAFKA_BROKERS
          value: kafka:9092
        - name: SOLANA_RPC_URL
          value: https://api.devnet.solana.com
---
apiVersion: v1
kind: Service
metadata:
  name: solana-connector
spec:
  selector:
    app: solana-connector
  ports:
  - port: 8082
    targetPort: 8082
