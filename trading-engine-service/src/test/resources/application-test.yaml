spring:
  datasource:
    url: jdbc:h2:mem:tradingdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  kafka:
    bootstrap-servers: localhost:9092
  liquibase:
    enabled: false # Disable liquibase for fast H2 tests

app:
  platform:
    wallet: PlatformW
    token-account: PlatformATA
